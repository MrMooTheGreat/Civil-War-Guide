<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Civil War Field Survival</title>

<style>
body{
  margin:0;
  font-family: Georgia, serif;
  background:#111;
  color:#eee;
}

.game{
  max-width:800px;
  margin:50px auto;
  padding:20px;
}

.card{
  background:#1b1b1b;
  border:1px solid #333;
  padding:25px;
  border-radius:12px;
}

h1{
  color:#c7a26a;
  margin-bottom:10px;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin:15px 0;
  font-size:14px;
  color:#ccc;
}

button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:12px;
  background:#222;
  border:1px solid #444;
  color:#eee;
  cursor:pointer;
  border-radius:8px;
  transition:0.2s;
}

button:hover{
  background:#2a2a2a;
  border-color:#c7a26a;
}

.small{
  font-size:13px;
  color:#aaa;
}
</style>

</head>

<body>

<div class="game">

  <div class="card">

    <h1 id="title">Camp Life Begins</h1>

    <div class="stats">
      <div>❤️ Health: <span id="health">100</span></div>
      <div>🎖 Morale: <span id="morale">100</span></div>
      <div>📍 Day: <span id="day">1</span></div>
    </div>

    <p id="story">
      You are a new recruit arriving at a Civil War encampment.
      The air is heavy, tents stretch across the field, and orders echo in the distance.
    </p>

    <div id="choices"></div>

    <p class="small" id="hint">
      Your choices will affect survival and morale.
    </p>

  </div>

</div>

<script>

let health = 100;
let morale = 100;
let day = 1;

const title = document.getElementById("title");
const story = document.getElementById("story");
const choices = document.getElementById("choices");

const healthEl = document.getElementById("health");
const moraleEl = document.getElementById("morale");
const dayEl = document.getElementById("day");

function updateStats(){
  healthEl.innerText = health;
  moraleEl.innerText = morale;
  dayEl.innerText = day;
}

function endCheck(){
  if(health <= 0){
    story.innerText = "You succumbed to illness and exhaustion in camp. Your service ends here.";
    choices.innerHTML = "";
    return true;
  }
  if(morale <= 0){
    story.innerText = "You desert the army, unable to continue under the strain of war.";
    choices.innerHTML = "";
    return true;
  }
  return false;
}

function nextDay(){
  day++;
  health -= 5;
  morale -= 3;
}

function renderCamp(){
  title.innerText = "Camp Life";

  story.innerText =
    "You are in camp. The day is slow but demanding. Orders may come at any time.";

  choices.innerHTML = "";

  addChoice("Clean your rifle", ()=>{
    morale += 5;
    health -= 2;
    nextDay();
    renderMarch();
  });

  addChoice("Rest in your tent", ()=>{
    health += 8;
    morale -= 5;
    nextDay();
    renderMarch();
  });

  addChoice("Write a letter home", ()=>{
    morale += 10;
    nextDay();
    renderMarch();
  });
}

function renderMarch(){

  if(endCheck()) return;

  title.innerText = "Forced March";

  story.innerText =
    "Your unit is ordered to march for miles across rough terrain.";

  choices.innerHTML = "";

  addChoice("Keep pace with the unit", ()=>{
    health -= 10;
    morale += 2;
    nextDay();
    renderBattleChance();
  });

  addChoice("Fall behind to rest briefly", ()=>{
    health -= 5;
    morale -= 5;
    nextDay();
    renderBattleChance();
  });

  addChoice("Help another exhausted soldier", ()=>{
    health -= 8;
    morale += 8;
    nextDay();
    renderBattleChance();
  });
}

function renderBattleChance(){

  if(endCheck()) return;

  title.innerText = "Sudden Engagement";

  story.innerText =
    "Gunfire erupts nearby. Your unit is drawn into sudden combat.";

  choices.innerHTML = "";

  addChoice("Hold the line and fire", ()=>{
    health -= 15;
    morale += 10;
    nextDay();
    renderCamp();
  });

  addChoice("Take cover and wait", ()=>{
    health -= 8;
    morale -= 5;
    nextDay();
    renderCamp();
  });

  addChoice("Retreat slightly to regroup", ()=>{
    health -= 5;
    morale -= 10;
    nextDay();
    renderCamp();
  });
}

function addChoice(text, action){
  const btn = document.createElement("button");
  btn.innerText = text;
  btn.onclick = ()=>{
    action();
    updateStats();
  };
  choices.appendChild(btn);
}

// start game
updateStats();
renderCamp();

</script>

</body>
</html>
