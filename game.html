<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Civil War Strategy Game</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<style>

body{
  background:#b89a70;
  color:#1a120c;

  font-family:"Times New Roman", Times, serif;

  margin:0;
  padding:20px;

  line-height:1.6;
}

.container{
  max-width:1450px;
  margin:auto;
  background:#c9ab80;
  border:4px solid #3b2617;
  padding:30px;
  box-shadow:0 0 20px rgba(0,0,0,.35);
}

header{
  text-align:center;
  border-bottom:3px double #4b301d;
  padding-bottom:20px;
  margin-bottom:25px;
}

header h1{
  font-size:52px;
  margin-bottom:10px;
  text-transform:uppercase;
  letter-spacing:3px;
}

header p{
  font-style:italic;
  font-size:20px;
}

nav{
  text-align:center;
  margin-bottom:30px;
  padding:10px 0;
  border-top:2px solid #4b301d;
  border-bottom:2px solid #4b301d;
}

nav a{
  color:#1a120c;
  text-decoration:none;
  margin:0 10px;
  text-transform:uppercase;
  font-size:14px;
}

.gameLayout{
  display:flex;
  gap:20px;
  align-items:flex-start;
}

#gameArea{
  flex:1;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-bottom:20px;
}

.bar{
  background:#b59163;
  border:2px solid #3b2617;
  padding:12px;
  font-size:22px;
  text-align:center;
}

#timeline{
  text-align:center;
  font-size:30px;
  margin-bottom:20px;
  text-transform:uppercase;
  border-top:2px solid #4b301d;
  border-bottom:2px solid #4b301d;
  padding:10px;
}

#map{
  background:#b08c62;
  border:4px solid #3b2617;
  padding:18px;
  margin-bottom:20px;
}

svg{
  width:100%;
  max-width:1325px;
  height:auto;
  display:block;
  margin:auto;
  background:#8d6f4c;
}

.controls{
  text-align:center;
  margin-bottom:20px;
}

button{
  background:#5b3a24;
  color:#f2dfbe;
  border:2px solid #2a1a10;
  padding:12px 18px;
  margin:6px;
  cursor:pointer;
  text-transform:uppercase;
  font-family:"Times New Roman", Times, serif;
  font-size:16px;
}

button:hover{
  background:#3f2818;
}

#event{
  background:#b59163;
  border:3px solid #3b2617;
  padding:18px;
  font-size:22px;
  min-height:50px;
}

#sidebar{
  width:280px;
}

.panel{
  background:#b59163;
  border:3px solid #3b2617;
  padding:18px;
  margin-bottom:20px;
}

.panel h3{
  margin-top:0;
  text-transform:uppercase;
  font-size:26px;
}

.panel p{
  font-size:19px;
}

#endScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(15,10,5,.92);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:#f2dfbe;
  font-size:42px;
  z-index:999;
}

</style>
</head>

<body>

<div class="container">

<header>
  <h1>Civil War Strategy</h1>
  <p>War Department Simulation — Command The Union Army</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Campaign</a>
  <a href="#">Battle Map</a>
</nav>

<div class="gameLayout">

<div id="gameArea">

<div class="stats">
  <div class="bar">🟦 Union Army: <span id="unionArmy">1100</span></div>
  <div class="bar">🟥 Confederacy: <span id="confedArmy">1100</span></div>
  <div class="bar">🛠 Supplies: <span id="supplies">150</span></div>
  <div class="bar">❤️ Morale: <span id="morale">150</span></div>
</div>

<div id="timeline">April 1861</div>

<div id="map"></div>

<div class="controls">
  <button onclick="endTurn()">End Turn</button>
  <button onclick="restTurn()">Rest / Regroup</button>
</div>

<div id="event">
  War begins...
</div>

</div>

<div id="sidebar">

<div class="panel">
  <h3>Frontline Status</h3>
  <p>You may only attack bordering enemy states.</p>
</div>

<div class="panel">
  <h3>Orders</h3>
  <p>Click enemy territory to attack.</p>
</div>

</div>

</div>

</div>

<div id="endScreen"></div>

<script>

function restTurn(){
  document.getElementById("event").innerText =
    "Armies regroup and reinforce supply lines.";
}

function endTurn(){
  document.getElementById("event").innerText =
    "The war continues into another month.";
}

function drawMap(){

  d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
  .then(us => {

    const states =
      topojson.feature(us, us.objects.states).features;

    d3.select("svg").remove();

    const svg = d3.select("#map")
      .append("svg")
      .attr("viewBox","0 0 1000 600");

    const projection = d3.geoAlbersUsa()
      .translate([500,300])
      .scale(1400);

    const path = d3.geoPath().projection(projection);

    svg.selectAll("path")
      .data(states)
      .enter()
      .append("path")
      .attr("d", path)
      .style("fill","#7d6a53")
      .style("stroke","#1a120c")
      .style("stroke-width","1.2px");
  });
}

drawMap();

</script>

</body>
</html>
