<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Civil War Strategy Game</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #1c1c1c;
  color: #fff;
}
header {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #333;
}
.bar {
  padding: 5px 10px;
  background: #444;
  border-radius: 5px;
}
#map {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 20px;
}
.state {
  padding: 20px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #555;
  user-select: none;
}
.union { background: #2b4cff; }
.confed { background: #b22222; }
.neutral { background: #555; }
#event {
  padding: 10px;
  background: #222;
  min-height: 40px;
}
button {
  padding: 10px;
  margin: 10px;
  cursor: pointer;
}
</style>
</head>
<body>

<header>
  <div class="bar">🪖 Army: <span id="army">100</span></div>
  <div class="bar">🛠️ Supplies: <span id="supplies">100</span></div>
  <div class="bar">❤️ Morale: <span id="morale">100</span></div>
  <div class="bar">🚂 Rail: <span id="rail">100</span></div>
</header>

<div id="map"></div>

<div style="text-align:center;">
  <button onclick="endTurn()">End Turn</button>
</div>

<div id="event">Event Log: Game Start</div>

<script>
const states = [
  "Virginia","Ohio","Georgia","Texas","Florida",
  "Alabama","Kentucky","Tennessee","Carolinas","Mississippi"
];

let stateData = {};
let player = "union";

states.forEach(s => stateData[s] = "neutral");

stateData["Ohio"] = "union";
stateData["Virginia"] = "confed";

function getStat(id) {
  return parseInt(document.getElementById(id).innerText);
}

function setStat(id, value) {
  value = Math.max(0, Math.min(200, value));
  document.getElementById(id).innerText = value;
}

function renderMap() {
  const map = document.getElementById("map");
  map.innerHTML = "";

  states.forEach(state => {
    const div = document.createElement("div");
    div.classList.add("state");
    div.classList.add(stateData[state]);
    div.innerText = state;

    div.onclick = () => handleStateClick(state);
    map.appendChild(div);
  });
}

function handleStateClick(state) {
  if (stateData[state] === player) {
    document.getElementById("event").innerText = "You already control " + state;
    return;
  }

  const army = getStat("army");
  const morale = getStat("morale");

  const attackPower = army * (0.5 + morale / 200);
  const defensePower = 50 + Math.random() * 50;

  let win = attackPower > defensePower;

  if (win) {
    stateData[state] = player;
    setStat("army", army - 10);
    document.getElementById("event").innerText = "Victory at " + state;
  } else {
    setStat("morale", morale - 10);
    document.getElementById("event").innerText = "Defeat at " + state;
  }

  renderMap();
}

function randomEvent() {
  const events = [
    "Disease outbreak reduces morale",
    "Supply shipment arrived",
    "Railroads damaged in storm"
  ];
  return events[Math.floor(Math.random() * events.length)];
}

function endTurn() {
  const supplies = getStat("supplies");
  const morale = getStat("morale");

  setStat("supplies", supplies - 5);
  setStat("morale", morale - 2);

  document.getElementById("event").innerText = "Event: " + randomEvent();

  renderMap();
}

renderMap();
</script>

</body>
</html>
