<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Civil War Camp Survival</title>

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:#111;
  color:#f3f3f3;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  width:90%;
  max-width:800px;
  background:#1c1c1c;
  border-radius:16px;
  padding:2rem;
  border:1px solid rgba(255,255,255,0.1);
}

h1{
  color:#c7a26a;
  margin-bottom:10px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin:20px 0;
}

.stat{
  background:#222;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.bar{
  height:10px;
  background:#333;
  border-radius:5px;
  margin-top:5px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:50%;
  background:#c7a26a;
}

.actions{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

button{
  padding:12px;
  background:#2a2a2a;
  border:1px solid rgba(255,255,255,0.1);
  color:white;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#c7a26a;
  color:black;
}

#log{
  margin-top:15px;
  padding:10px;
  background:#151515;
  border-radius:10px;
  height:80px;
  overflow:auto;
  font-size:.9rem;
  color:#ccc;
}
</style>
</head>

<body>

<div class="game">

<h1>Civil War Camp Survival</h1>
<p>Survive 7 days in camp. Manage your soldier wisely.</p>

<div class="stats">

  <div class="stat">
    Hunger
    <div class="bar"><div id="hunger" class="fill"></div></div>
  </div>

  <div class="stat">
    Health
    <div class="bar"><div id="health" class="fill"></div></div>
  </div>

  <div class="stat">
    Fatigue
    <div class="bar"><div id="fatigue" class="fill"></div></div>
  </div>

  <div class="stat">
    Morale
    <div class="bar"><div id="morale" class="fill"></div></div>
  </div>

</div>

<div class="actions">

<button onclick="action('eat')">Eat Rations</button>
<button onclick="action('rest')">Rest</button>
<button onclick="action('drill')">Drill Training</button>
<button onclick="action('work')">Camp Duty</button>

</div>

<div id="log"></div>

</div>

<script>

let stats = {
  hunger: 60,
  health: 70,
  fatigue: 40,
  morale: 60,
  day: 1
};

function updateUI(){

  document.getElementById("hunger").style.width = stats.hunger + "%";
  document.getElementById("health").style.width = stats.health + "%";
  document.getElementById("fatigue").style.width = stats.fatigue + "%";
  document.getElementById("morale").style.width = stats.morale + "%";

  checkGameOver();
}

function log(msg){
  let box = document.getElementById("log");
  box.innerHTML = msg + "<br>" + box.innerHTML;
}

function nextDay(){
  stats.day++;

  stats.hunger -= 10;
  stats.fatigue += 10;

  if(stats.hunger < 40) stats.health -= 5;
  if(stats.fatigue > 70) stats.morale -= 5;

  log("Day " + stats.day + " begins in camp...");
}

function action(type){

  if(stats.day > 7){
    log("Training complete.");
    return;
  }

  if(type === "eat"){
    stats.hunger += 25;
    stats.morale += 5;
    log("You eat hardtack and drink water.");
  }

  if(type === "rest"){
    stats.fatigue -= 25;
    stats.health += 5;
    log("You rest in your tent.");
  }

  if(type === "drill"){
    stats.fatigue += 15;
    stats.morale += 10;
    log("You drill with your unit.");
  }

  if(type === "work"){
    stats.fatigue += 10;
    stats.hunger -= 5;
    log("You perform camp duties.");
  }

  // clamp
  for(let k in stats){
    if(k !== "day"){
      stats[k] = Math.max(0, Math.min(100, stats[k]));
    }
  }

  updateUI();

  if(Math.random() < 0.5){
    nextDay();
  }
}

function checkGameOver(){

  if(stats.health <= 0){
    log("You fell ill in camp. Game over.");
  }

  if(stats.day > 7){
    log("You survived the week in camp. Training complete.");
  }
}

updateUI();

log("You arrive at camp. Survive 7 days.");

</script>

</body>
</html>
