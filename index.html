<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Civil War Guide</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  background:#b39469;
  color:#1c130d;
  font-family:"Times New Roman", serif;
  margin:0;
  line-height:1.8;
}

/* ============================
   SLIDESHOW INSIDE BORDER
   ============================ */

.inner-slideshow{
  position:relative;
  width:100%;
  height:300px;
  overflow:hidden;
  border:4px solid #3e2918;
  margin-bottom:30px;
}

.inner-slideshow img{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  animation:fadeShow 60s infinite;
  filter:sepia(1) brightness(.8) contrast(1.1);
}

/* Staggered fade timing */
.inner-slideshow img:nth-child(1){ animation-delay:0s; }
.inner-slideshow img:nth-child(2){ animation-delay:5s; }
.inner-slideshow img:nth-child(3){ animation-delay:10s; }
.inner-slideshow img:nth-child(4){ animation-delay:15s; }
.inner-slideshow img:nth-child(5){ animation-delay:20s; }
.inner-slideshow img:nth-child(6){ animation-delay:25s; }
.inner-slideshow img:nth-child(7){ animation-delay:30s; }
.inner-slideshow img:nth-child(8){ animation-delay:35s; }
.inner-slideshow img:nth-child(9){ animation-delay:40s; }
.inner-slideshow img:nth-child(10){ animation-delay:45s; }
.inner-slideshow img:nth-child(11){ animation-delay:50s; }
.inner-slideshow img:nth-child(12){ animation-delay:55s; }

@keyframes fadeShow{
  0%{ opacity:0; }
  5%{ opacity:1; }
  25%{ opacity:1; }
  30%{ opacity:0; }
  100%{ opacity:0; }
}

/* ============================
   MAIN PAGE CONTENT
   ============================ */

.guide-page{
  max-width:1000px;
  margin:auto;
  background:#c6a67b;
  border-left:5px solid #3e2918;
  border-right:5px solid #3e2918;
  padding:30px;
}

.guide-header{
  text-align:center;
  border-bottom:4px double #4d321d;
  padding-bottom:25px;
  margin-bottom:40px;
}

.guide-header h1{
  font-size:54px;
  text-transform:uppercase;
  letter-spacing:3px;
  margin-bottom:10px;
}

.guide-header p{
  font-size:18px;
  font-style:italic;
}

.guide-section{
  margin-bottom:45px;
  padding-bottom:30px;
  border-bottom:2px solid rgba(0,0,0,.15);
}

h2{
  font-size:34px;
  text-transform:uppercase;
  border-bottom:2px solid rgba(0,0,0,.2);
  padding-bottom:8px;
  margin-bottom:20px;
}

p{
  font-size:20px;
  margin-bottom:18px;
}

/* NAVIGATION */

.bottom-nav{
  text-align:center;
  margin-top:40px;
  padding-top:20px;
  border-top:3px double #4b301d;
}

.nav-btn{
  display:inline-block;
  background:#5b3a24;
  color:#f2dfbe;
  text-decoration:none;
  padding:10px 16px;
  margin:6px;
  border:2px solid #2a1a10;
  text-transform:uppercase;
  font-size:14px;
}

.nav-btn:hover{
  background:#6d4a30;
}

</style>
</head>

<body>
