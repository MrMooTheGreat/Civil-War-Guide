<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Civil War AI</title>

<style>
  :root {
    --bg: #343541;
    --panel: #444654;
    --text: #ececf1;
    --user: #0b93f6;
    --border: #565869;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
  }

  .chat-wrapper {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    height: 100%;
  }

  /* top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    border-bottom: 1px solid var(--border);
    background: #40414f;
  }

  .title {
    font-weight: bold;
  }

  .reset-btn {
    background: #8e2a2a;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
  }

  .reset-btn:hover {
    opacity: 0.9;
  }

  /* messages */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .msg {
    max-width: 80%;
    padding: 12px 14px;
    margin: 10px 0;
    border-radius: 12px;
    white-space: pre-wrap;
  }

  .user {
    background: var(--user);
    color: white;
    margin-left: auto;
  }

  .bot {
    background: var(--panel);
    margin-right: auto;
  }

  /* input */
  .input-bar {
    display: flex;
    padding: 12px;
    border-top: 1px solid var(--border);
    background: #40414f;
  }

  textarea {
    flex: 1;
    resize: none;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #40414f;
    color: white;
  }

  button.send {
    margin-left: 10px;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: var(--user);
    color: white;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="chat-wrapper">

  <div class="topbar">
    <div class="title">Civil War AI Historian</div>
    <button class="reset-btn" onclick="resetChat()">Reset Conversation</button>
  </div>

  <div id="chat"></div>

  <div class="input-bar">
    <textarea id="input" rows="1" placeholder="Message Civil War AI..."></textarea>
    <button class="send" onclick="send()">Send</button>
  </div>

</div>

<script>
const API_KEY = "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";

/* 🧠 MEMORY STORE */
let memory = []; 
const MAX_MEMORY = 10; // keeps last 10 messages

const chat = document.getElementById("chat");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* 🧹 RESET FUNCTION */
function resetChat() {
  memory = [];
  chat.innerHTML = "";
  addMsg("Conversation reset. Ask a new question about the Civil War.", "bot");
}

/* 🧠 SEND MESSAGE */
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  addMsg("Thinking...", "bot");
  const botMsg = chat.lastChild;

  /* store user message */
  memory.push({ role: "user", content: text });

  if (memory.length > MAX_MEMORY) {
    memory = memory.slice(-MAX_MEMORY);
  }

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          {
            role: "system",
            content: "You are a knowledgeable Civil War historian. Be accurate, concise, and maintain context from prior messages."
          },
          ...memory
        ]
      })
    });

    const data = await res.json();
    const reply =
      data.choices?.[0]?.message?.content ||
      JSON.stringify(data, null, 2);

    botMsg.textContent = reply;

    /* store assistant reply */
    memory.push({ role: "assistant", content: reply });

    if (memory.length > MAX_MEMORY) {
      memory = memory.slice(-MAX_MEMORY);
    }

  } catch (err) {
    botMsg.textContent = "Error: " + err.message;
  }
}
</script>

</body>
</html>
