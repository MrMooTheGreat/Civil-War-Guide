<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Civil War AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      font-size: 14px;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      cursor: pointer;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
    }

    #output {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 15px;
      border-radius: 6px;
      min-height: 100px;
    }
  </style>
</head>

<body>

<h2>Civil War AI Historian</h2>

<textarea id="input" placeholder="Ask about the Civil War..."></textarea>
<br>
<button onclick="send()">Send</button>

<div id="output"></div>

<script>
const API_KEY = "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"; // ⚠️ visible in browser

async function send() {
  const text = document.getElementById("input").value;
  const output = document.getElementById("output");

  output.textContent = "Thinking...";

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          {
            role: "system",
            content: "You are a knowledgeable historian specializing in the American Civil War. Answer clearly and concisely."
          },
          {
            role: "user",
            content: text
          }
        ]
      })
    });

    const data = await res.json();

    output.textContent =
      data.choices?.[0]?.message?.content ||
      JSON.stringify(data, null, 2);

  } catch (err) {
    output.textContent = "Error: " + err.message;
  }
}
</script>

</body>
</html>
