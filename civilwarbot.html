<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Civil War AI</title>

<style>
:root {
  --bg: #343541;
  --panel: #444654;
  --text: #ececf1;
  --user: #0b93f6;
  --border: #565869;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
}

.chat-wrapper {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  height: 100%;
}

/* top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #40414f;
  border-bottom: 1px solid var(--border);
}

.reset-btn {
  background: #8e2a2a;
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

/* chat area */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.msg {
  max-width: 80%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  white-space: pre-wrap;
}

.user {
  background: var(--user);
  color: white;
  margin-left: auto;
}

.bot {
  background: var(--panel);
  margin-right: auto;
}

/* input */
.input-bar {
  display: flex;
  padding: 12px;
  background: #40414f;
  border-top: 1px solid var(--border);
}

textarea {
  flex: 1;
  border: none;
  outline: none;
  padding: 10px;
  border-radius: 8px;
  background: #40414f;
  color: white;
  resize: none;
}

button.send {
  margin-left: 10px;
  padding: 10px 16px;
  border: none;
  background: var(--user);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* 🟣 single ChatGPT-style thinking bubble */
.thinking-bubble {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #b0b0b0;
  opacity: 0.6;
  animation: pulseBubble 1s infinite ease-in-out;
  vertical-align: middle;
}

@keyframes pulseBubble {
  0% { transform: scale(0.8); opacity: 0.4; }
  50% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(0.8); opacity: 0.4; }
}
</style>
</head>

<body>

<div class="chat-wrapper">

  <div class="topbar">
    <div>Civil War AI Historian</div>
    <button class="reset-btn" onclick="resetChat()">Reset Conversation</button>
  </div>

  <div id="chat"></div>

  <div class="input-bar">
    <textarea id="input" rows="1"></textarea>
    <button class="send" onclick="send()">Send</button>
  </div>

</div>

<script>
const API_KEY = "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";

let memory = [];
const MAX_MEMORY = 10;

const chat = document.getElementById("chat");

/* messages */
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

/* 🟣 single pulsing thinking bubble */
function addLoader() {
  const div = document.createElement("div");
  div.className = "msg bot";

  const bubble = document.createElement("span");
  bubble.className = "thinking-bubble";

  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return div;
}

/* ✨ typing animation */
function typeText(el, text, speed = 12) {
  el.textContent = "";
  let i = 0;

  function type() {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(type, speed);
    }
  }

  type();
}

/* reset */
function resetChat() {
  memory = [];
  chat.innerHTML = "";
  addMsg("Conversation reset. Ask a question about the Civil War.", "bot");
}

/* send */
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const loader = addLoader();

  memory.push({ role: "user", content: text });
  if (memory.length > MAX_MEMORY) memory = memory.slice(-MAX_MEMORY);

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          {
            role: "system",
            content: "You are a Civil War historian. Be accurate, concise, and helpful."
          },
          ...memory
        ]
      })
    });

    const data = await res.json();
    const reply =
      data.choices?.[0]?.message?.content ||
      "Error getting response.";

    loader.remove();

    const botMsg = addMsg("", "bot");
    typeText(botMsg, reply);

    memory.push({ role: "assistant", content: reply });
    if (memory.length > MAX_MEMORY) memory = memory.slice(-MAX_MEMORY);

  } catch (err) {
    loader.remove();
    addMsg("Error: " + err.message, "bot");
  }
}
</script>

</body>
</html>
